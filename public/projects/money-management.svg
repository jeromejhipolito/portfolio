<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0F1524"/>
  <rect x="20" y="20" width="760" height="40" rx="4" fill="#161D30"/>
  <circle cx="45" cy="40" r="6" fill="#FF79C6"/>
  <circle cx="65" cy="40" r="6" fill="#FFB86C"/>
  <circle cx="85" cy="40" r="6" fill="#3DFF9A"/>
  <text x="400" y="44" fill="#94A3B8" font-family="monospace" font-size="14" text-anchor="middle">Money Management — Finance Dashboard</text>
  <!-- Balance card -->
  <rect x="20" y="80" width="370" height="120" rx="4" fill="#161D30"/>
  <text x="40" y="110" fill="#94A3B8" font-family="monospace" font-size="12">Total Balance</text>
  <text x="40" y="145" fill="#3DFF9A" font-family="monospace" font-size="32">₱ 1,247,350.00</text>
  <text x="40" y="175" fill="#3DFF9A" font-family="monospace" font-size="11">↑ 12.4% from last month</text>
  <!-- Accounts card -->
  <rect x="410" y="80" width="370" height="120" rx="4" fill="#161D30"/>
  <text x="430" y="110" fill="#94A3B8" font-family="monospace" font-size="12">Accounts Overview</text>
  <rect x="430" y="125" width="80" height="55" rx="3" fill="#0A0E1A"/>
  <text x="470" y="148" fill="#00D9FF" font-family="monospace" font-size="18" text-anchor="middle">3</text>
  <text x="470" y="165" fill="#94A3B8" font-family="monospace" font-size="9" text-anchor="middle">Savings</text>
  <rect x="520" y="125" width="80" height="55" rx="3" fill="#0A0E1A"/>
  <text x="560" y="148" fill="#BD93F9" font-family="monospace" font-size="18" text-anchor="middle">2</text>
  <text x="560" y="165" fill="#94A3B8" font-family="monospace" font-size="9" text-anchor="middle">Invest</text>
  <rect x="610" y="125" width="80" height="55" rx="3" fill="#0A0E1A"/>
  <text x="650" y="148" fill="#FFB86C" font-family="monospace" font-size="18" text-anchor="middle">1</text>
  <text x="650" y="165" fill="#94A3B8" font-family="monospace" font-size="9" text-anchor="middle">Debt</text>
  <rect x="700" y="125" width="60" height="55" rx="3" fill="#0A0E1A"/>
  <text x="730" y="148" fill="#FF79C6" font-family="monospace" font-size="18" text-anchor="middle">2</text>
  <text x="730" y="165" fill="#94A3B8" font-family="monospace" font-size="9" text-anchor="middle">Credit</text>
  <!-- Chart area -->
  <rect x="20" y="220" width="760" height="210" rx="4" fill="#161D30"/>
  <text x="40" y="250" fill="#E2E8F0" font-family="monospace" font-size="14">Monthly Spending Trend</text>
  <!-- Simple line chart -->
  <polyline points="60,380 140,350 220,360 300,320 380,300 460,340 540,280 620,290 700,260 740,270" stroke="#00D9FF" stroke-width="2" fill="none"/>
  <polyline points="60,380 140,350 220,360 300,320 380,300 460,340 540,280 620,290 700,260 740,270 740,400 60,400" fill="url(#chartGrad)" opacity="0.15"/>
  <defs>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
  </defs>
  <!-- X axis labels -->
  <text x="60" y="415" fill="#475569" font-family="monospace" font-size="10">Apr</text>
  <text x="220" y="415" fill="#475569" font-family="monospace" font-size="10">Jun</text>
  <text x="380" y="415" fill="#475569" font-family="monospace" font-size="10">Aug</text>
  <text x="540" y="415" fill="#475569" font-family="monospace" font-size="10">Oct</text>
  <text x="700" y="415" fill="#475569" font-family="monospace" font-size="10">Dec</text>
</svg>
